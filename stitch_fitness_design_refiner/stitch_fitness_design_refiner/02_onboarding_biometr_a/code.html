<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-surface/80 dark:bg-surface/80 backdrop-blur-xl docked full-width top-0 z-50 border-b border-glass-border flex justify-between items-center w-full px-margin-mobile h-16">
<button aria-label="Volver" class="text-primary dark:text-primary-fixed hover:bg-brand-glass-fill transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-headline-lg text-headline-lg tracking-tighter italic text-primary-container">FITCORE</span>
<button aria-label="Cerrar" class="text-primary dark:text-primary-fixed hover:bg-brand-glass-fill transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Content Canvas -->
<main class="flex-1 px-margin-mobile pt-lg pb-xl max-w-md mx-auto w-full">
<!-- Progress Bar -->
<div class="mb-xl">
<div class="flex justify-between items-end mb-base">
<span class="font-label-sm text-label-sm uppercase tracking-widest text-text-muted">Paso 02</span>
<span class="font-data-mono text-data-mono text-primary-container">20%</span>
</div>
<div class="h-1 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary-container to-secondary-container w-1/5 transition-all duration-500"></div>
</div>
</div>
<!-- Header -->
<section class="mb-xl">
<h1 class="font-hero-md text-hero-md text-primary mb-xs">Háblanos de ti</h1>
<p class="font-body-md text-body-md text-text-muted">Personaliza tu experiencia para obtener cálculos de bio-rendimiento exactos.</p>
</section>
<!-- Biometrics Form -->
<form class="space-y-lg">
<!-- Gender Selection -->
<div class="space-y-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant">GÉNERO</label>
<div class="grid grid-cols-2 gap-gutter">
<button class="active-gender flex flex-col items-center justify-center py-lg rounded-xl border border-brand-glass-border transition-all duration-300" onclick="toggleGender(this)" type="button">
<span class="material-symbols-outlined text-hero-md mb-base" data-icon="male">male</span>
<span class="font-label-caps text-label-caps">HOMBRE</span>
</button>
<button class="glass-fill flex flex-col items-center justify-center py-lg rounded-xl border border-glass-border text-text-muted hover:border-brand-glass-border transition-all duration-300" onclick="toggleGender(this)" type="button">
<span class="material-symbols-outlined text-hero-md mb-base" data-icon="female">female</span>
<span class="font-label-caps text-label-caps">MUJER</span>
</button>
</div>
</div>
<!-- Numerical Inputs Grid -->
<div class="grid grid-cols-1 gap-lg">
<!-- Age -->
<div class="glass-fill border border-glass-border rounded-xl p-md glass-glow transition-all">
<label class="font-label-caps text-label-caps text-on-surface-variant block mb-base">EDAD</label>
<div class="flex items-baseline justify-between">
<input class="bg-transparent border-none p-0 focus:ring-0 font-hero-lg text-hero-lg text-primary w-full" max="100" min="13" placeholder="25" type="number"/>
<span class="font-label-caps text-label-caps text-text-muted">AÑOS</span>
</div>
</div>
<!-- Height & Weight Row -->
<div class="grid grid-cols-2 gap-gutter">
<!-- Height -->
<div class="glass-fill border border-glass-border rounded-xl p-md glass-glow transition-all">
<label class="font-label-caps text-label-caps text-on-surface-variant block mb-base">ESTATURA</label>
<div class="flex items-baseline justify-between">
<input class="bg-transparent border-none p-0 focus:ring-0 font-hero-md text-hero-md text-primary w-full" max="250" min="100" placeholder="180" type="number"/>
<span class="font-label-caps text-label-caps text-text-muted">CM</span>
</div>
</div>
<!-- Weight -->
<div class="glass-fill border border-glass-border rounded-xl p-md glass-glow transition-all">
<label class="font-label-caps text-label-caps text-on-surface-variant block mb-base">PESO</label>
<div class="flex items-baseline justify-between">
<input class="bg-transparent border-none p-0 focus:ring-0 font-hero-md text-hero-md text-primary w-full" max="300" min="30" placeholder="75" type="number"/>
<span class="font-label-caps text-label-caps text-text-muted">KG</span>
</div>
</div>
</div>
</div>

<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>

<button class="w-full bg-primary-container text-on-primary-fixed font-headline-md text-headline-md py-lg rounded-xl active:scale-95 transition-all shadow-lg hover:shadow-primary-container/20" type="submit">
                    CONTINUAR
                </button>
</div>
</form>
</main>
<!-- Scripts for micro-interactions -->
<script>
        function toggleGender(btn) {
            // Get all siblings in the grid
            const buttons = btn.parentElement.querySelectorAll('button');
            buttons.forEach(b => {
                b.classList.remove('active-gender');
                b.classList.add('glass-fill', 'text-text-muted');
                b.classList.remove('border-brand-glass-border');
                b.classList.add('border-glass-border');
            });
            
            // Toggle active state for current button
            btn.classList.add('active-gender');
            btn.classList.remove('glass-fill', 'text-text-muted', 'border-glass-border');
            btn.classList.add('border-brand-glass-border');
        }

        // Handle numeric input focus and empty states for placeholders
        const inputs = document.querySelectorAll('input[type="number"]');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                if(input.value === '') {
                    // Small aesthetic feedback
                }
            });
        });
    </script>
