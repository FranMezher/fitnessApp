<!DOCTYPE html>

<style>
        body {
            background-color: #080808;
            color: #e5e2e1;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.09);
        }
        .speed-selector-active {
            background: rgba(204, 255, 0, 0.08);
            border: 1px solid rgba(204, 255, 0, 0.35);
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- Top Navigation -->
<header class="bg-surface/80 dark:bg-surface/80 backdrop-blur-xl border-b border-glass-border docked full-width top-0 z-50 flex justify-between items-center w-full px-margin-mobile h-16">
<button class="text-primary dark:text-primary-fixed hover:bg-brand-glass-fill transition-colors p-2 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-lg text-headline-lg tracking-tighter italic text-primary-container">FITCORE</h1>
<button class="text-primary dark:text-primary-fixed hover:bg-brand-glass-fill transition-colors p-2 rounded-full">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<main class="flex-grow px-margin-mobile pt-lg pb-32 max-w-md mx-auto w-full">
<!-- Progress Bar Section -->
<div class="mb-xl">
<div class="flex justify-between items-end mb-base">
<span class="font-label-caps text-label-caps text-primary-container">PASO 06/10</span>
<span class="font-data-mono text-data-mono text-primary-fixed">60%</span>
</div>
<div class="h-1 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary-container to-secondary-container" style="width: 60%"></div>
</div>
</div>
<!-- Headline -->
<div class="mb-xl text-center">
<h2 class="font-hero-md text-hero-md text-on-surface mb-xs">Meta y velocidad</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Define tu objetivo final y el ritmo con el que quieres alcanzarlo.</p>
</div>
<!-- Target Weight Input -->
<div class="glass-card rounded-xl p-lg mb-lg text-center relative overflow-hidden group">
<div class="absolute inset-0 bg-brand-glass-fill opacity-0 group-focus-within:opacity-100 transition-opacity pointer-events-none"></div>
<label class="font-label-caps text-label-caps text-text-muted mb-md block" for="target-weight">PESO OBJETIVO (KG)</label>
<div class="flex items-center justify-center gap-xs">
<input class="bg-transparent border-none text-center font-hero-lg text-hero-lg text-primary-container focus:ring-0 w-32 font-data-mono" id="target-weight" oninput="updateProjections(this.value)" step="0.1" type="number" value="75.0"/>
<span class="font-headline-md text-headline-md text-on-surface-variant self-end pb-base">KG</span>
</div>
<div class="mt-base h-px w-24 mx-auto bg-primary-container/30 group-focus-within:bg-primary-container transition-colors shadow-[0_0_8px_rgba(204,255,0,0.3)]"></div>
</div>
<!-- Speed Selection -->
<div class="space-y-gutter">
<label class="font-label-caps text-label-caps text-text-muted mb-xs block">VELOCIDAD DE PROGRESO</label>
<!-- Sustainable -->
<button class="w-full speed-option glass-card rounded-xl p-md flex items-center justify-between transition-all duration-300 hover:bg-glass-fill border-brand-glass-border speed-selector-active" onclick="selectSpeed(this, 'sustainable')">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined">eco</span>
</div>
<div class="text-left">
<p class="font-headline-md text-headline-md text-on-surface">Sostenible</p>
<p class="font-body-md text-body-md text-on-surface-variant">-0.25 kg / semana</p>
</div>
</div>
<div class="text-right">
<p class="font-data-mono text-data-mono text-primary-fixed">~24 Sem</p>
</div>
</button>
<!-- Moderate -->
<button class="w-full speed-option glass-card rounded-xl p-md flex items-center justify-between transition-all duration-300 hover:bg-glass-fill" onclick="selectSpeed(this, 'moderate')">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center text-secondary">
<span class="material-symbols-outlined">bolt</span>
</div>
<div class="text-left">
<p class="font-headline-md text-headline-md text-on-surface">Moderado</p>
<p class="font-body-md text-body-md text-on-surface-variant">-0.50 kg / semana</p>
</div>
</div>
<div class="text-right">
<p class="font-data-mono text-data-mono text-text-muted">~12 Sem</p>
</div>
</button>
<!-- Aggressive -->
<button class="w-full speed-option glass-card rounded-xl p-md flex items-center justify-between transition-all duration-300 hover:bg-glass-fill" onclick="selectSpeed(this, 'aggressive')">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center text-error">
<span class="material-symbols-outlined">whatshot</span>
</div>
<div class="text-left">
<p class="font-headline-md text-headline-md text-on-surface">Agresivo</p>
<p class="font-body-md text-body-md text-on-surface-variant">-0.80 kg / semana</p>
</div>
</div>
<div class="text-right">
<p class="font-data-mono text-data-mono text-text-muted">~8 Sem</p>
</div>
</button>
</div>
<!-- Summary Note -->
<div class="mt-lg p-md rounded-lg border border-accent-glass-border bg-accent-glass-fill">
<div class="flex gap-xs items-start">
<span class="material-symbols-outlined text-secondary scale-75">info</span>
<p class="font-body-md text-body-md text-secondary">Los cambios agresivos requieren un seguimiento nutricional más estricto para evitar pérdida muscular.</p>
</div>
</div>
</main>
<!-- Fixed Action Button Area -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile bg-gradient-to-t from-surface via-surface to-transparent pt-8 z-40">
<button class="w-full h-14 bg-primary-container text-on-primary-container rounded-xl font-headline-md text-headline-md flex items-center justify-center gap-xs active:scale-95 transition-transform shadow-[0_8px_24px_rgba(204,255,0,0.2)]">
            CONTINUAR
            <span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
<!-- Background Atmospheric Effect -->
<div class="fixed top-1/3 -right-24 w-64 h-64 bg-primary-container/10 blur-[120px] rounded-full pointer-events-none -z-10"></div>
<div class="fixed bottom-1/4 -left-24 w-48 h-48 bg-secondary-container/10 blur-[100px] rounded-full pointer-events-none -z-10"></div>
<script>
        function selectSpeed(element, speed) {
            // Remove active class from all options
            document.querySelectorAll('.speed-option').forEach(opt => {
                opt.classList.remove('speed-selector-active');
                opt.querySelector('.font-data-mono').classList.replace('text-primary-fixed', 'text-text-muted');
            });

            // Add active class to selected
            element.classList.add('speed-selector-active');
            element.querySelector('.font-data-mono').classList.replace('text-text-muted', 'text-primary-fixed');
            
            // Subtle Haptic feedback simulation
            if ('vibrate' in navigator) {
                navigator.vibrate(10);
            }
        }

        function updateProjections(val) {
            // Logic would go here to update the week counts based on current vs target weight
            console.log('Target weight updated to:', val);
        }
    </script>
</body></html>
