<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>

        tailwind.config = {

            extend: {

                "brand-glass-border": "rgba(204, 255, 0, 0.35)",
                "surface-bright": "#3a3939",
                "outline-variant": "#444933",
                "text-primary": "#F2F2F2",
                "on-surface-variant": "#c4c9ac",
                "inverse-surface": "#e5e2e1",
                "primary-fixed-dim": "#abd600",
                "on-tertiary-container": "#656464",
                "tertiary-fixed": "#e5e2e1",
                "secondary-container": "#b83900",
                "on-surface": "#e5e2e1",
                "secondary-fixed-dim": "#ffb59d",
                "surface-container-high": "#2a2a2a",
                "error-container": "#93000a",
                "on-tertiary-fixed-variant": "#474646",
                "surface-dim": "#131313",
                "surface-container-highest": "#353534",
                "accent-glass-fill": "rgba(255, 107, 53, 0.1)",
                "background": "#131313",
                "inverse-on-surface": "#313030",
                "on-primary-fixed": "#161e00",
                "on-tertiary-fixed": "#1c1b1b",
                "on-error-container": "#ffdad6",
                "error": "#ffb4ab",
                "tertiary": "#ffffff",
                "inverse-primary": "#506600",
                "primary": "#ffffff",
                "surface-container-lowest": "#0e0e0e",
                "surface-container": "#201f1f",
                "on-secondary-container": "#ffddd2",
                "on-primary-fixed-variant": "#3c4d00",
                "tertiary-fixed-dim": "#c9c6c5",
                "on-secondary-fixed-variant": "#832600",
                "outline": "#8e9379",
                "on-primary-container": "#556d00",
                "on-secondary": "#5d1900",
                "surface-tint": "#abd600",
                "glass-fill": "rgba(255, 255, 255, 0.04)",
                "tertiary-container": "#e5e2e1",
                "surface-variant": "#353534",
                "surface-container-low": "#1c1b1b",
                "primary-container": "#c3f400"
              },
              "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
              },
              "spacing": {

                "sm": "12px",
                "margin-mobile": "20px",

                "lg": "24px"
              },
              "fontFamily": {
                "data-mono": ["monospace"],

                "headline-md": ["Space Grotesk"],

                "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "4px", "fontWeight": "700"}],
                "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                "hero-md": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}]

          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-card {
            background-color: rgba(204, 255, 0, 0.08) !important;
            border-color: rgba(204, 255, 0, 0.35) !important;
        }
        .active-card .icon-box {
            color: #c3f400 !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- TopAppBar Fragmented from JSON -->
<header class="fixed top-0 z-50 w-full flex justify-between items-center px-margin-mobile h-16 bg-surface/80 backdrop-blur-xl border-b border-glass-border">
<button aria-label="Atrás" class="text-primary hover:bg-brand-glass-fill transition-colors p-2 rounded-lg">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="font-headline-lg text-headline-lg tracking-tighter italic text-primary-container">FITCORE</span>
<button aria-label="Cerrar" class="text-primary hover:bg-brand-glass-fill transition-colors p-2 rounded-lg">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<main class="flex-1 mt-16 px-margin-mobile pb-32 max-w-md mx-auto w-full">
<!-- Progress Bar Section -->
<div class="py-lg">
<div class="flex justify-between items-center mb-base">
<span class="font-label-sm text-label-sm uppercase tracking-widest text-primary-fixed-dim">Paso 04</span>
<span class="font-data-mono text-data-mono text-primary-container">40%</span>
</div>
<div class="h-1 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary-container to-secondary-container w-[40%] transition-all duration-700 ease-out"></div>
</div>
</div>
<!-- Headline -->
<div class="mb-xl">
<h1 class="font-hero-md text-hero-md mb-xs text-primary leading-tight">Nivel de actividad diaria</h1>
<p class="font-body-md text-body-md text-text-muted">Esto nos ayuda a calcular tus necesidades calóricas con precisión técnica.</p>
</div>
<!-- Activity Cards Selection -->
<div class="grid gap-gutter" id="activity-selector">
<!-- Sedentario -->
<button class="group flex items-center p-md bg-glass-fill border border-glass-border rounded-xl backdrop-blur-md text-left transition-all hover:bg-brand-glass-fill active:scale-95 duration-200" onclick="selectActivity(this)">
<div class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-container-high group-hover:bg-brand-glass-fill mr-md icon-box transition-colors">
<span class="material-symbols-outlined text-2xl">chair</span>
</div>
<div class="flex-1">
<h3 class="font-headline-md text-headline-md text-primary">Sedentario</h3>
<p class="font-body-md text-body-md text-text-muted">Trabajo de oficina, poco ejercicio.</p>
</div>
</button>
<!-- Ligeramente Activo -->
<button class="group flex items-center p-md bg-glass-fill border border-glass-border rounded-xl backdrop-blur-md text-left transition-all hover:bg-brand-glass-fill active:scale-95 duration-200" onclick="selectActivity(this)">
<div class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-container-high group-hover:bg-brand-glass-fill mr-md icon-box transition-colors">
<span class="material-symbols-outlined text-2xl">directions_walk</span>
</div>
<div class="flex-1">
<h3 class="font-headline-md text-headline-md text-primary">Ligeramente activo</h3>
<p class="font-body-md text-body-md text-text-muted">De pie parte del día, 1-2 entrenos/sem.</p>
</div>
</button>
<!-- Activo -->
<button class="group flex items-center p-md bg-glass-fill border border-glass-border rounded-xl backdrop-blur-md text-left transition-all hover:bg-brand-glass-fill active:scale-95 duration-200 active-card" onclick="selectActivity(this)">
<div class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-container-high group-hover:bg-brand-glass-fill mr-md icon-box transition-colors">
<span class="material-symbols-outlined text-2xl">fitness_center</span>
</div>
<div class="flex-1">
<h3 class="font-headline-md text-headline-md text-primary">Activo</h3>
<p class="font-body-md text-body-md text-text-muted">Movimiento constante, 3-5 entrenos/sem.</p>
</div>
</button>
<!-- Muy Activo -->
<button class="group flex items-center p-md bg-glass-fill border border-glass-border rounded-xl backdrop-blur-md text-left transition-all hover:bg-brand-glass-fill active:scale-95 duration-200" onclick="selectActivity(this)">
<div class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-container-high group-hover:bg-brand-glass-fill mr-md icon-box transition-colors">
<span class="material-symbols-outlined text-2xl">potted_plant</span>
</div>
<div class="flex-1">
<h3 class="font-headline-md text-headline-md text-primary">Muy activo</h3>
<p class="font-body-md text-body-md text-text-muted">Trabajo físico intenso o atleta élite.</p>
</div>
</button>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile bg-gradient-to-t from-background via-background to-transparent pt-xl">
<button class="w-full h-14 bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(204,255,0,0.2)] active:scale-95 transition-all">
            CONTINUAR
        </button>
</div>
<!-- Visual Polish: Decorative blurred background elements -->
<div class="fixed top-[20%] -left-20 w-64 h-64 bg-primary-container/10 blur-[100px] -z-10 pointer-events-none"></div>
<div class="fixed bottom-[10%] -right-20 w-64 h-64 bg-secondary-container/10 blur-[100px] -z-10 pointer-events-none"></div>
<script>
        function selectActivity(element) {
            const container = document.getElementById('activity-selector');
            const buttons = container.getElementsByTagName('button');
            
            // Remove active state from all
            for (let btn of buttons) {
                btn.classList.remove('active-card');
            }
            
            // Add active state to selected
            element.classList.add('active-card');

            // Haptic-like feedback if supported
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(5);
            }
        }
    </script>
</body></html>
