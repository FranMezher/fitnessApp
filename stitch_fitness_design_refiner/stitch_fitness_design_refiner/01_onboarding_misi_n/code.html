<script>
        function selectGoal(element) {
            // Remove active state from all cards
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                card.classList.remove('glass-card-active');
                const indicator = card.querySelector('.selection-indicator');
                if(indicator) indicator.classList.add('opacity-0');
            });

            // Add active state to selected card
            element.classList.add('glass-card-active');
            const indicator = element.querySelector('.selection-indicator');
            if(indicator) indicator.classList.remove('opacity-0');

            // Enable continue button
            const btn = document.getElementById('continue-btn');
            btn.disabled = false;

            // Micro-interaction: haptic feel
            element.style.transform = 'scale(0.98)';
            setTimeout(() => {
                element.style.transform = 'scale(1)';
            }, 100);
        }

        // Atmospheric visual effect: Glow mouse follower (subtle)
        document.addEventListener('mousemove', (e) => {
            const container = document.body;
            const x = e.clientX;
            const y = e.clientY;
            // This is a subtle visual flair for high-end feel
            // In a real app we might use a dedicated div for this
        });
    </script>
