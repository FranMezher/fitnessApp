<script>
        // Simple Interaction logic
        document.querySelectorAll('input[name="strength_level"]').forEach(radio => {
            radio.addEventListener('change', () => {
                // Future logic: Trigger haptic feedback or update a global store
                console.log('Nivel seleccionado:', radio.value);
            });
        });

        // Interactive HUD detail: Hover effect on glass cards
        const cards = document.querySelectorAll('#strength-selector label');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.querySelector('.glass-fill').style.setProperty('--mouse-x', `${x}px`);
                card.querySelector('.glass-fill').style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
