<script>
        // Micro-interactions
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                btn.classList.add('scale-95');
                setTimeout(() => btn.classList.remove('scale-95'), 100);
            });
        });

        // Simple interaction for category toggling
        const categoryButtons = document.querySelectorAll('.rounded-full.uppercase');
        categoryButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryButtons.forEach(b => {
                    b.classList.remove('active-pill');
                    b.classList.add('border', 'border-glass-border', 'text-on-surface-variant');
                });
                btn.classList.add('active-pill');
                btn.classList.remove('border', 'border-glass-border', 'text-on-surface-variant');
            });
        });
    </script>
