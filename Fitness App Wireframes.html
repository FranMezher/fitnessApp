<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness App — Wireframes</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Caveat+Brush&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'Caveat', cursive; color: #eee; }

  /* Sketch UI primitives */
  .phone {
    width: 320px;
    background: #1a1a1a;
    border-radius: 36px;
    border: 2.5px solid #444;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 1px #333, 4px 8px 32px rgba(0,0,0,0.6);
  }
  .phone-notch {
    width: 100px; height: 28px;
    background: #111;
    border-radius: 0 0 20px 20px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }
  .phone-screen {
    padding: 0 16px 24px;
    min-height: 580px;
    position: relative;
  }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 16px 10px;
    font-size: 13px; color: #888;
    letter-spacing: 0.5px;
  }

  /* Sketch style elements */
  .sketch-box {
    background: #252525;
    border: 1.5px solid #444;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    position: relative;
  }
  .sketch-box.neon { border-color: #CCFF00; }
  .sketch-box.orange { border-color: #FF6B35; }
  .sketch-box.accent-fill { background: #CCFF00; color: #111; }
  .sketch-box.orange-fill { background: #FF6B35; color: #fff; }

  .sketch-label {
    font-size: 11px; color: #666; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 4px;
    font-family: 'Caveat', cursive;
  }
  .sketch-title { font-size: 20px; font-weight: 700; color: #eee; line-height: 1.2; }
  .sketch-val { font-size: 28px; font-weight: 700; color: #CCFF00; }
  .sketch-sub { font-size: 14px; color: #888; }
  .sketch-body { font-size: 15px; color: #ccc; }

  .sketch-btn {
    display: block; width: 100%;
    background: #CCFF00; color: #111;
    border: none; border-radius: 50px;
    padding: 12px; font-size: 18px; font-weight: 700;
    font-family: 'Caveat', cursive;
    text-align: center; cursor: pointer; margin-bottom: 8px;
  }
  .sketch-btn.ghost {
    background: transparent; color: #CCFF00;
    border: 1.5px solid #CCFF00;
  }
  .sketch-btn.orange-btn { background: #FF6B35; color: #fff; }

  .sketch-input {
    background: #222; border: 1.5px solid #444; border-radius: 10px;
    padding: 10px 12px; color: #eee; font-size: 16px;
    font-family: 'Caveat', cursive; width: 100%; margin-bottom: 8px;
  }
  .sketch-input::placeholder { color: #555; }

  .progress-bar-wrap {
    background: #2a2a2a; border-radius: 10px; height: 8px; overflow: hidden;
    margin: 6px 0;
  }
  .progress-bar-fill { height: 100%; border-radius: 10px; background: #CCFF00; }

  .macro-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .macro-chip {
    flex: 1; background: #252525; border: 1.5px solid #333;
    border-radius: 10px; padding: 8px 6px; text-align: center;
  }
  .macro-chip .val { font-size: 18px; font-weight: 700; color: #CCFF00; }
  .macro-chip .lbl { font-size: 11px; color: #777; }

  .row { display: flex; gap: 8px; margin-bottom: 10px; }
  .row > * { flex: 1; }

  .avatar-circle {
    width: 44px; height: 44px; border-radius: 50%;
    background: #333; border: 1.5px solid #555;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .tag {
    display: inline-block; background: #222; border: 1px solid #555;
    border-radius: 20px; padding: 3px 10px; font-size: 13px; color: #aaa;
    margin: 2px;
  }
  .tag.active { background: #CCFF00; color: #111; border-color: #CCFF00; font-weight: 700; }

  .exercise-row {
    display: flex; align-items: center; gap: 10px;
    background: #252525; border: 1.5px solid #333; border-radius: 10px;
    padding: 10px 12px; margin-bottom: 8px;
  }
  .ex-icon {
    width: 36px; height: 36px; background: #333; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }

  .ring-wrap {
    position: relative; width: 80px; height: 80px;
    display: flex; align-items: center; justify-content: center;
  }
  .ring-text { position: absolute; text-align: center; }

  .notif-pill {
    background: #252525; border: 1.5px solid #333; border-radius: 14px;
    padding: 10px 12px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .notif-icon {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }

  .nav-bar {
    display: flex; justify-content: space-around; align-items: center;
    background: #1a1a1a; border-top: 1px solid #333;
    padding: 10px 0 14px; margin: 0 -16px -24px;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; font-size: 11px; color: #666;
  }
  .nav-item.active { color: #CCFF00; }
  .nav-dot { font-size: 22px; line-height: 1; }

  .badge {
    display: inline-block; background: #FF6B35;
    border-radius: 50%; width: 18px; height: 18px;
    font-size: 11px; text-align: center; line-height: 18px; color: #fff;
    position: absolute; top: -4px; right: -4px;
  }

  .divider { border: none; border-top: 1px dashed #333; margin: 10px 0; }

  .section-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .see-all { font-size: 13px; color: #CCFF00; }

  /* Annotation arrows */
  .annotation {
    position: absolute;
    font-size: 13px; color: #CCFF00; font-family: 'Caveat', cursive;
    line-height: 1.3;
  }

  /* Screen label */
  .screen-label {
    text-align: center; color: #666; font-size: 16px;
    margin-top: 10px; letter-spacing: 0.5px;
  }

  /* Streak dots */
  .streak-row { display: flex; gap: 6px; justify-content: center; margin: 8px 0; }
  .streak-dot {
    width: 28px; height: 28px; border-radius: 50%;
    background: #252525; border: 1.5px solid #444;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
  }
  .streak-dot.done { background: #CCFF00; border-color: #CCFF00; color: #111; font-weight: 700; }
  .streak-dot.today { border-color: #CCFF00; color: #CCFF00; }

  /* Pose skeleton placeholder */
  .pose-box {
    background: #1e1e1e; border: 1.5px dashed #555; border-radius: 12px;
    height: 140px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    margin-bottom: 10px; color: #666; font-size: 14px; text-align: center;
    padding: 10px;
  }
  .pose-overlay {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; padding: 6px 8px;
  }
  .pose-badge {
    background: rgba(204,255,0,0.15); border: 1px solid #CCFF00;
    border-radius: 8px; padding: 3px 8px; font-size: 12px; color: #CCFF00;
  }

  .onboarding-step {
    font-size: 12px; color: #666; text-align: center; margin-bottom: 14px;
  }
  .step-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #333;
  }
  .step-dot.active { background: #CCFF00; width: 20px; border-radius: 4px; }

  /* Gamification badge */
  .badge-card {
    background: linear-gradient(135deg, #222 0%, #2a2a1a 100%);
    border: 1.5px solid #CCFF00; border-radius: 14px;
    padding: 12px; text-align: center; margin-bottom: 10px;
  }
  .badge-icon { font-size: 32px; margin-bottom: 4px; }
  .xp-bar-wrap {
    background: #2a2a2a; border-radius: 10px; height: 10px;
    overflow: hidden; margin: 6px 0;
  }
  .xp-bar { height: 100%; background: linear-gradient(90deg, #CCFF00, #aadd00); border-radius: 10px; }

  .pantry-item {
    background: #252525; border: 1.5px solid #333; border-radius: 10px;
    padding: 8px 12px; margin-bottom: 6px; display: flex;
    justify-content: space-between; align-items: center;
  }
  .macro-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    margin-right: 4px;
  }

  /* Canvas label style */
  .canvas-section-label {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: #CCFF00;
    letter-spacing: 1px;
    padding: 24px 32px 8px;
    border-bottom: 1px dashed #333;
    margin-bottom: 0;
  }

  /* Flow arrow */
  .flow-arrow {
    display: flex; align-items: center; color: #555; font-size: 28px;
    padding: 0 4px; align-self: center; margin-top: -24px;
  }
</style>
</head>
<body>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

// ─── SHARED PHONE WRAPPER ───────────────────────────────────────────────────
function Phone({ label, children, width = 320 }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
      <div className="phone" style={{ width }}>
        <div className="phone-notch" />
        <div className="status-bar"><span>9:41</span><span>●●● 100%</span></div>
        <div className="phone-screen">{children}</div>
      </div>
      {label && <div className="screen-label">{label}</div>}
    </div>
  );
}

// ─── BOTTOM NAV ─────────────────────────────────────────────────────────────
function BottomNav({ active = 'home' }) {
  const items = [
    { id: 'home', icon: '⌂', label: 'Inicio' },
    { id: 'train', icon: '◈', label: 'Entrena' },
    { id: 'food', icon: '◎', label: 'Nutrición' },
    { id: 'prog', icon: '▣', label: 'Progreso' },
    { id: 'me', icon: '◉', label: 'Yo' },
  ];
  return (
    <div className="nav-bar">
      {items.map(i => (
        <div key={i.id} className={`nav-item ${active === i.id ? 'active' : ''}`}>
          <div className="nav-dot">{i.icon}</div>
          <span>{i.label}</span>
        </div>
      ))}
    </div>
  );
}

// ─── RING SVG ────────────────────────────────────────────────────────────────
function Ring({ pct = 72, size = 80, color = '#CCFF00', label = '', sub = '' }) {
  const r = (size / 2) - 8;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct / 100);
  return (
    <div className="ring-wrap" style={{ width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#2a2a2a" strokeWidth="7" />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color}
          strokeWidth="7" strokeDasharray={circ} strokeDashoffset={offset}
          strokeLinecap="round" />
      </svg>
      <div className="ring-text">
        <div style={{ fontSize: size * 0.22, fontWeight: 700, color }}>{label}</div>
        <div style={{ fontSize: size * 0.14, color: '#777' }}>{sub}</div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// SECTION 1 — ONBOARDING FLOW
// ═══════════════════════════════════════════════════════════════════════════

function OnboardWelcome() {
  return <Phone label="1 — Bienvenida">
    <div style={{ textAlign: 'center', paddingTop: 24 }}>
      <div style={{ fontSize: 64, marginBottom: 12 }}>⚡</div>
      <div style={{ fontSize: 32, fontWeight: 700, color: '#CCFF00', marginBottom: 6 }}>FITCORE</div>
      <div style={{ fontSize: 16, color: '#777', marginBottom: 32 }}>Tu cuerpo. Tu ritmo. Tu meta.</div>
      <div className="sketch-btn">Comenzar gratis</div>
      <div className="sketch-btn ghost">Ya tengo cuenta</div>
      <div style={{ marginTop: 24, fontSize: 13, color: '#555' }}>Al continuar aceptas los Términos de uso</div>
    </div>
  </Phone>;
}

function OnboardBio() {
  return <Phone label="2 — Datos biométricos">
    <div className="step-dots">
      <div className="step-dot active" /><div className="step-dot" /><div className="step-dot" /><div className="step-dot" />
    </div>
    <div className="sketch-title" style={{ marginBottom: 4 }}>Cuéntanos sobre ti</div>
    <div className="sketch-sub" style={{ marginBottom: 16 }}>Calculamos tu plan ideal</div>

    <div className="sketch-label">Sexo</div>
    <div className="row" style={{ marginBottom: 12 }}>
      <div className="sketch-box neon" style={{ textAlign: 'center', padding: '10px 0' }}>
        <div style={{ fontSize: 20 }}>♂</div>
        <div style={{ fontSize: 14, color: '#CCFF00' }}>Hombre</div>
      </div>

      <input className="sketch-input" placeholder="78" readOnly />

    <div style={{ marginTop: 8 }}>

    <BottomNav active="" />
  </Phone>;
}

function OnboardGoal() {
  return <Phone label="3 — Objetivo">

    </div>
    <div className="sketch-title" style={{ marginBottom: 4 }}>¿Cuál es tu meta?</div>
    <div className="sketch-sub" style={{ marginBottom: 14 }}>Puedes cambiarla después</div>

    {[
      { icon: '🔥', title: 'Perder grasa', sub: 'Déficit calórico inteligente', active: true },
      { icon: '💪', title: 'Ganar músculo', sub: 'Superávit + proteína alta' },
      { icon: '⚡', title: 'Rendimiento', sub: 'Fuerza y resistencia' },
      { icon: '🧘', title: 'Salud general', sub: 'Equilibrio y bienestar' },
    ].map(g => (
      <div key={g.title} className={`sketch-box ${g.active ? 'neon' : ''}`} style={{ display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer' }}>
        <div style={{ fontSize: 28 }}>{g.icon}</div>
        <div>

          <div style={{ fontSize: 13, color: '#777' }}>{g.sub}</div>
        </div>
        {g.active && <div style={{ marginLeft: 'auto', color: '#CCFF00', fontSize: 20 }}>✓</div>}
      </div>
    ))}

    <div style={{ marginTop: 8 }}><div className="sketch-btn">Continuar</div></div>
  </Phone>;
}

function OnboardPlan() {
  return <Phone label="4 — Tu plan">
    <div className="step-dots">
      <div className="step-dot" /><div className="step-dot" /><div className="step-dot" /><div className="step-dot active" />
    </div>
    <div className="sketch-title" style={{ marginBottom: 2 }}>Tu plan está listo 🎉</div>
    <div className="sketch-sub" style={{ marginBottom: 14 }}>Basado en tu perfil</div>

    <div className="sketch-box neon" style={{ marginBottom: 10 }}>
      <div className="sketch-label">Calorías objetivo / día</div>
      <div className="sketch-val">1,840 kcal</div>
      <div className="macro-row" style={{ marginTop: 8 }}>
        <div className="macro-chip"><div className="val">145g</div><div className="lbl">Proteína</div></div>
        <div className="macro-chip"><div className="val">198g</div><div className="lbl">Carbos</div></div>
        <div className="macro-chip"><div className="val">55g</div><div className="lbl">Grasas</div></div>
      </div>
    </div>

    <div className="sketch-box" style={{ marginBottom: 10 }}>
      <div className="sketch-label">Entrenamiento semanal</div>
      <div style={{ fontSize: 18, color: '#eee' }}>4 días / semana</div>
      <div style={{ fontSize: 14, color: '#777' }}>~35 min por sesión · En casa</div>
    </div>

    <div className="sketch-box orange" style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 14, color: '#FF6B35', fontWeight: 700 }}>⚠ Primera semana de adaptación</div>
      <div style={{ fontSize: 13, color: '#999' }}>Intensidad reducida para evitar lesiones</div>
    </div>

    <div className="sketch-btn">¡Empezar ahora!</div>

}

// ═══════════════════════════════════════════════════════════════════════════
// SECTION 2 — DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════

function DashboardMain() {

    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
      <div>
        <div style={{ fontSize: 14, color: '#777' }}>Buenos días,</div>
        <div style={{ fontSize: 22, fontWeight: 700, color: '#eee' }}>Carlos 👋</div>

// SECTION 3 — WORKOUT

function WorkoutScreen() {
  return <Phone label="Rutina del día">
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
