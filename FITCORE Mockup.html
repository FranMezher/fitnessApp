<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FITCORE — Mockup Hi-Fi</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080808;
    font-family: 'Space Grotesk', sans-serif;
    color: #F2F2F2;
    -webkit-font-smoothing: antialiased;
  }
  input { font-family: 'Space Grotesk', sans-serif; }
  button { font-family: 'Space Grotesk', sans-serif; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
</style>
</head>
<body>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="fitcore-screens.jsx"></script>
<script type="text/babel">

const DCCanvas = window.DesignCanvas;
const DCSection = window.DCSection;
const DCArtboard = window.DCArtboard;

const {
  ScreenLogin, ScreenOnboardGoal, ScreenDashboard,
  ScreenWorkoutAI, ScreenNutrition, ScreenPantry,
  ScreenPostSummary, ScreenStretch, ScreenRecovery,
  ScreenProfile, ScreenGamification,
} = window;

function App() {
  return (
    <DCCanvas title="FITCORE — Mockup Hi-Fi">

      <DCSection id="auth" title="① ACCESO — Login y onboarding">
        <DCArtboard id="login" label="Login" width={320} height={660}>
          <ScreenLogin />
        </DCArtboard>
        <DCArtboard id="goal" label="Onboarding · Objetivo" width={320} height={660}>
          <ScreenOnboardGoal />
        </DCArtboard>
      </DCSection>

      <DCSection id="core" title="② NÚCLEO — Dashboard · Entrenamiento IA · Nutrición">
        <DCArtboard id="dash" label="Dashboard" width={320} height={820}>
          <ScreenDashboard />
        </DCArtboard>
        <DCArtboard id="wkai" label="Workout · IA activa" width={320} height={780}>
          <ScreenWorkoutAI />
        </DCArtboard>
        <DCArtboard id="nutri" label="Nutrición" width={320} height={820}>
          <ScreenNutrition />
        </DCArtboard>
        <DCArtboard id="pantry" label="Modo Despensa ★" width={320} height={780}>
          <ScreenPantry />
        </DCArtboard>
      </DCSection>

      <DCSection id="post" title="③ POST-ENTRENO — Resumen · Elongación · Recuperación">
        <DCArtboard id="summary" label="Resumen sesión" width={320} height={800}>
          <ScreenPostSummary />
        </DCArtboard>
        <DCArtboard id="stretch" label="Elongación guiada" width={320} height={820}>
          <ScreenStretch />
        </DCArtboard>
        <DCArtboard id="recover" label="Protocolo recuperación" width={320} height={800}>
          <ScreenRecovery />
        </DCArtboard>
      </DCSection>

      <DCSection id="social" title="④ PROGRESO & PERFIL — Gamificación · Liga · Cuenta">
        <DCArtboard id="gamif" label="Logros & Liga" width={320} height={840}>
          <ScreenGamification />
        </DCArtboard>
        <DCArtboard id="profile" label="Mi perfil" width={320} height={840}>
          <ScreenProfile />
        </DCArtboard>
      </DCSection>

    </DCCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
